<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="bvh-title bvh-desc">
  <title id="bvh-title">Model is the brain, harness is the body</title>
  <desc id="bvh-desc">Side-by-side diagram showing what a model does on its own (text in, text out) versus what a harness adds on top (read files, run commands, remember across sessions, talk to other apps).</desc>

  <defs>
    <linearGradient id="brain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="harness" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5a4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0ea5a4" stop-opacity="0.04"/>
    </linearGradient>
    <style>
      .panel { fill: url(#brain); stroke: #7c5cff; stroke-width: 1.5; }
      .panel-h { fill: url(#harness); stroke: #0ea5a4; stroke-width: 1.5; }
      .label { font: 700 18px/1 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; fill: #2b2a36; }
      .label-h { fill: #064e4d; }
      .head { font: 600 14px/1 ui-sans-serif, system-ui, sans-serif; fill: #4a4960; letter-spacing: 0.06em; text-transform: uppercase; }
      .body { font: 14px/1.55 ui-sans-serif, system-ui, -apple-system, sans-serif; fill: #2b2a36; }
      .arrow { stroke: #2b2a36; stroke-width: 1.5; fill: none; }
      .arrow-h { stroke: #064e4d; }
      .arrow-h { stroke: #064e4d; }
      .summary { font: 600 16px/1.4 ui-sans-serif, system-ui, sans-serif; fill: #1a1a1a; }
      .summary-h { fill: #1a1a1a; }
      .arrow-text { font: 12px/1 ui-monospace, monospace; fill: #5a5a5a; }
      @media (prefers-color-scheme: dark) {
        .label, .body, .summary { fill: #ece8db; }
        .label-h { fill: #7cd9d8; }
        .head, .arrow-text { fill: #a8a395; }
        .arrow { stroke: #ece8db; }
        .arrow-h { stroke: #7cd9d8; }
      }
    </style>
  </defs>

  <!-- Left panel: Model = Brain -->
  <g>
    <rect class="panel" x="24" y="40" width="360" height="280" rx="16"/>
    <text class="head" x="44" y="68">Model = Brain</text>
    <!-- Brain icon (simple silhouette) -->
    <g transform="translate(60, 88)">
      <path d="M22 8 C12 8 4 16 4 26 C0 30 0 38 6 42 C4 48 8 56 16 56 L18 56 C20 60 24 62 28 60 L30 60 C32 64 38 64 40 60 C44 62 50 60 52 56 C60 56 64 48 62 42 C68 38 68 30 64 26 C64 16 56 8 46 8 C40 6 32 6 22 8 Z" fill="#7c5cff" fill-opacity="0.85"/>
      <path d="M30 22 Q34 28 30 34 M40 22 Q44 28 40 34 M48 22 Q52 28 48 34" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </g>
    <text class="label" x="120" y="110">A model takes text in,</text>
    <text class="label" x="120" y="132">returns text out.</text>
    <text class="body" x="44" y="172">• No file access</text>
    <text class="body" x="44" y="196">• No command execution</text>
    <text class="body" x="44" y="220">• No memory between sessions</text>
    <text class="body" x="44" y="244">• No integration with other apps</text>
    <text class="body" x="44" y="280" font-style="italic" fill="#5a5a5a">Examples: Claude, GPT,</text>
    <text class="body" x="44" y="300" font-style="italic" fill="#5a5a5a">DeepSeek, Kimi, Qwen.</text>
  </g>

  <!-- Right panel: Harness = Body -->
  <g>
    <rect class="panel-h" x="416" y="40" width="360" height="280" rx="16"/>
    <text class="head label-h" x="436" y="68">Harness = Body</text>
    <!-- Body/chassis icon (rounded box with a person inside) -->
    <g transform="translate(440, 86)">
      <rect x="0" y="0" width="60" height="68" rx="10" fill="#0ea5a4" fill-opacity="0.85"/>
      <circle cx="30" cy="22" r="9" fill="#fff"/>
      <path d="M14 56 C14 44 22 38 30 38 C38 38 46 44 46 56" fill="#fff"/>
    </g>
    <text class="label label-h" x="512" y="110">A harness gives the</text>
    <text class="label label-h" x="512" y="132">model a body.</text>
    <text class="body" x="436" y="172">• Reads &amp; writes files</text>
    <text class="body" x="436" y="196">• Runs shell commands</text>
    <text class="body" x="436" y="220">• Remembers across sessions</text>
    <text class="body" x="436" y="244">• Talks to Discord, GitHub, etc.</text>
    <text class="body" x="436" y="280" font-style="italic" fill="#5a5a5a">Examples: Hermes,</text>
    <text class="body" x="436" y="300" font-style="italic" fill="#5a5a5a">OpenClaw, Claude Code.</text>
  </g>

  <!-- Bottom summary -->
  <g>
    <text class="summary" x="400" y="362" text-anchor="middle">The model is the brain. The harness is the body.</text>
    <text class="summary" x="400" y="386" text-anchor="middle" fill="#5a5a5a" font-size="14">In 2026 the bottleneck is no longer the model — it's the harness around it.</text>
  </g>

  <!-- Connection arrow from brain to body -->
  <g>
    <path class="arrow" d="M384 180 L416 180" stroke-dasharray="4 3"/>
    <path class="arrow" d="M412 176 L420 180 L412 184 Z" fill="#5a5a5a"/>
    <text class="arrow-text" x="400" y="170" text-anchor="middle">needs</text>
  </g>
</svg>