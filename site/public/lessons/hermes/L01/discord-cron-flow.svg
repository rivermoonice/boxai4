<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" role="img" aria-labelledby="dcf-title dcf-desc">
  <title id="dcf-title">Daily 7am Discord summary flow</title>
  <desc id="dcf-desc">A 3-step horizontal flow: a cron job fires at 7am, Hermes runs a summarize-news skill, and a Discord webhook posts the result to the ai-news channel.</desc>

  <defs>
    <linearGradient id="step" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0.02"/>
    </linearGradient>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#2b2a36"/>
    </marker>
    <style>
      .box { fill: url(#step); stroke: #7c5cff; stroke-width: 1.5; }
      .step { font: 700 11px/1 ui-sans-serif, system-ui, sans-serif; fill: #7c5cff; letter-spacing: 0.1em; }
      .title { font: 600 16px/1.2 ui-sans-serif, system-ui, sans-serif; fill: #1a1a1a; }
      .detail { font: 13px/1.4 ui-sans-serif, system-ui, sans-serif; fill: #4a4960; }
      .arrow { stroke: #2b2a36; stroke-width: 2; fill: none; }
      .label { font: 11px/1 ui-monospace, monospace; fill: #5a5a5a; }
      @media (prefers-color-scheme: dark) {
        .title { fill: #ece8db; }
        .detail, .label { fill: #a8a395; }
        .arrow { stroke: #ece8db; }
        marker path { fill: #ece8db; }
      }
    </style>
  </defs>

  <!-- Step 1: Cron -->
  <g>
    <rect class="box" x="24" y="50" width="240" height="120" rx="14"/>
    <text class="step" x="44" y="78">STEP 1</text>
    <text class="title" x="44" y="104">Cron fires at 7am</text>
    <text class="detail" x="44" y="128">hermes cron run</text>
    <text class="detail" x="44" y="148">daily-ai-summary</text>
    <!-- clock icon -->
    <g transform="translate(214, 88)">
      <circle cx="20" cy="20" r="18" fill="none" stroke="#7c5cff" stroke-width="2"/>
      <path d="M20 8 L20 20 L28 26" stroke="#7c5cff" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Arrow 1 -->
  <g>
    <line class="arrow" x1="272" y1="110" x2="316" y2="110" marker-end="url(#arrowhead)"/>
    <text class="label" x="294" y="100" text-anchor="middle">triggers</text>
  </g>

  <!-- Step 2: Hermes runs skill -->
  <g>
    <rect class="box" x="324" y="50" width="240" height="120" rx="14"/>
    <text class="step" x="344" y="78">STEP 2</text>
    <text class="title" x="344" y="104">Hermes runs the skill</text>
    <text class="detail" x="344" y="128">skill: summarize-news</text>
    <text class="detail" x="344" y="148">→ 3 headlines + 1-line each</text>
    <!-- gear icon -->
    <g transform="translate(514, 88)">
      <circle cx="20" cy="20" r="9" fill="none" stroke="#7c5cff" stroke-width="2"/>
      <g stroke="#7c5cff" stroke-width="2" stroke-linecap="round">
        <line x1="20" y1="4" x2="20" y2="9"/>
        <line x1="20" y1="31" x2="20" y2="36"/>
        <line x1="4" y1="20" x2="9" y2="20"/>
        <line x1="31" y1="20" x2="36" y2="20"/>
        <line x1="9" y1="9" x2="12" y2="12"/>
        <line x1="28" y1="28" x2="31" y2="31"/>
        <line x1="9" y1="31" x2="12" y2="28"/>
        <line x1="28" y1="12" x2="31" y2="9"/>
      </g>
    </g>
  </g>

  <!-- Arrow 2 -->
  <g>
    <line class="arrow" x1="572" y1="110" x2="616" y2="110" marker-end="url(#arrowhead)"/>
    <text class="label" x="594" y="100" text-anchor="middle">posts</text>
  </g>

  <!-- Step 3: Discord -->
  <g>
    <rect class="box" x="624" y="50" width="252" height="120" rx="14"/>
    <text class="step" x="644" y="78">STEP 3</text>
    <text class="title" x="644" y="104">Discord webhook delivers</text>
    <text class="detail" x="644" y="128">channel: #ai-news</text>
    <text class="detail" x="644" y="148">message: today's summary</text>
    <!-- Discord-like icon -->
    <g transform="translate(820, 88)">
      <rect x="0" y="0" width="40" height="40" rx="10" fill="#7c5cff" fill-opacity="0.15"/>
      <path d="M12 16 C16 12 24 12 28 16 L26 20 C24 18 22 18 20 18 L20 24 C24 24 26 22 28 20 M14 24 C16 26 22 28 28 24" fill="none" stroke="#7c5cff" stroke-width="2" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Caption -->
  <text class="label" x="450" y="200" text-anchor="middle">A real workflow you'll build in L08 — no glue code, just a cron entry and a Discord webhook URL.</text>
</svg>