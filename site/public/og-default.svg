<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      .bg { fill: #fdfdfb; }
      .accent { fill: #1f4dd9; }
      .ink { fill: #1a1a1a; }
      .muted { fill: #5a5a5a; }
      .border { fill: #e6e2d8; }
      .label { font: 600 18px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; letter-spacing: 0.12em; }
      .h1 { font: 700 76px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; letter-spacing: -0.02em; }
      .h2 { font: 400 28px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      .url { font: 500 18px ui-monospace, SFMono-Regular, Menlo, monospace; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="630" />
  <rect class="accent" x="0" y="0" width="6" height="630" />
  <g transform="translate(80, 120)">
    <text class="label accent" y="0">BOXMINING AI ACADEMY</text>
    <text class="h1 ink" y="100">A beginner-friendly</text>
    <text class="h1 ink" y="190">course on AI agents,</text>
    <text class="h1 ink" y="280">models, and real projects.</text>
    <text class="h2 muted" y="360">19 lessons · 3 modules · true-beginner tone</text>
    <text class="url muted" y="450">boxai4.boxmining.ai</text>
  </g>
</svg>